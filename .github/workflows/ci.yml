name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  javascript:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Test
        run: npm test -- --coverage

      - name: Build
        run: npm run build

      - name: Pack (verify publishable artifact)
        run: npm pack --dry-run

      - name: Size limit
        run: npx size-limit

  android:
    name: Android build (compiles Kotlin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install root deps
        run: npm ci

      - name: Install example deps
        working-directory: example
        run: npm ci

      - name: Gradle assembleDebug (example)
        working-directory: example/android
        run: ./gradlew assembleDebug --no-daemon
